apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: load-tester
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
        - name: orchestrator
          image: orchestrator:local
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: load-tester-config
            - secretRef:
                name: load-tester-secrets
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 800m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: load-tester
spec:
  selector:
    app: orchestrator
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP