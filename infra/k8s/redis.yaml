apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: load-tester
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: load-tester
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379