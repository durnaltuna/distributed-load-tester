name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run shared tests
        run: npm run -w shared test

      - name: Run worker tests
        run: npm run -w worker test

      - name: Run orchestrator tests
        run: npm run -w orchestrator test

      - name: Build all packages
        run: npm run build