name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run shared tests
        run: npm run -w shared test

      - name: Run worker tests
        run: npm run -w worker test

      - name: Run orchestrator tests
        run: npm run -w orchestrator test

      - name: Build all packages
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: test-and-build

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run E2E integration test
        run: npm run -w orchestrator test:e2e
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379